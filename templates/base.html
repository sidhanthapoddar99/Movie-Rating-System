<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MovieRate{% endblock %} | MovieRate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-card: #1a1a24;
            --accent: #e50914;
            --accent-hover: #ff1a25;
            --text-primary: #f0f0f0;
            --text-secondary: #8a8a9a;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .navbar-custom {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }
        .navbar-custom .navbar-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .navbar-custom .navbar-brand span { color: var(--accent); }
        .navbar-custom .nav-link {
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.2s;
        }
        .navbar-custom .nav-link:hover { color: var(--text-primary); }
        .card-dark {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
        }
        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-accent:hover {
            background: var(--accent-hover);
            color: white;
            transform: translateY(-1px);
        }
        .btn-outline-light-custom {
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            background: transparent;
        }
        .btn-outline-light-custom:hover {
            border-color: var(--text-secondary);
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .form-control-dark {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .form-control-dark:focus {
            background: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.15);
        }
        .form-control-dark::placeholder { color: var(--text-secondary); }
        .hero-section {
            padding: 6rem 0;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a0a0f 100%);
        }
        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }
        .page-center {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .rating-display {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .table-dark-custom {
            --bs-table-bg: var(--bg-card);
            --bs-table-border-color: var(--border);
            color: var(--text-primary);
        }
        .alert-dark-custom {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 1.5rem;
        }
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">Movie<span>Rate</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--border);">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/testresult">Try It</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sign_up">Sign Up</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="text-center">
        <div class="container">
            MovieRate &mdash; Sentiment-Powered Movie Ratings
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
