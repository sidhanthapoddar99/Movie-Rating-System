{% extends "base.html" %}
{% block title %}Make Prediction{% endblock %}
{% block content %}
<div class="page-center">
    <div class="card-dark" style="width: 100%; max-width: 550px;">
        <h2 class="section-title text-center mb-2">Make a Prediction</h2>
        <p class="text-secondary text-center mb-4">Enter your username and review to get a rating.</p>
        <form method="POST" action="/results_loggedin_users">
            <div class="mb-3">
                <input type="text" name="UserName" class="form-control form-control-dark" placeholder="Your username" required>
            </div>
            <div class="mb-4">
                <textarea name="review" class="form-control form-control-dark" rows="5" placeholder="Write your movie review here..." required></textarea>
            </div>
            <button type="submit" class="btn-accent w-100">Predict Rating</button>
        </form>
    </div>
</div>
{% endblock %}
