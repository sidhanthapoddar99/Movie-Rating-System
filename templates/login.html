{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="page-center">
    <div class="card-dark" style="width: 100%; max-width: 420px;">
        <h2 class="section-title text-center mb-4">User Login</h2>
        <form method="POST" action="/login_input">
            <div class="mb-3">
                <input type="text" name="UserName" class="form-control form-control-dark" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="Password" class="form-control form-control-dark" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-accent w-100">Login</button>
        </form>
        <p class="text-center mt-3 text-secondary">Don't have an account? <a href="/sign_up" style="color: var(--accent);">Sign Up</a></p>
    </div>
</div>
{% endblock %}
