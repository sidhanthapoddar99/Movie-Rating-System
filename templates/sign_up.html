{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="page-center">
    <div class="card-dark" style="width: 100%; max-width: 420px;">
        <h2 class="section-title text-center mb-4">Create Account</h2>
        <form method="POST" action="/signup_input">
            <div class="mb-3">
                <input type="text" name="UserName" class="form-control form-control-dark" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="Password" class="form-control form-control-dark" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn-accent w-100">Sign Up</button>
        </form>
        <p class="text-center mt-3 text-secondary">Already have an account? <a href="/login" style="color: var(--accent);">Login</a></p>
    </div>
</div>
{% endblock %}
