{% extends "base.html" %}
{% block title %}User Portal{% endblock %}
{% block content %}
<div class="page-center">
    <div style="width: 100%; max-width: 600px;">
        <h2 class="section-title text-center mb-5">User Portal</h2>
        <div class="d-grid gap-3">
            <a href="/makepred" class="card-dark text-decoration-none d-flex align-items-center justify-content-between" style="padding: 1.5rem 2rem;">
                <span class="fs-5" style="color: var(--text-primary);">Make a Prediction</span>
                <span style="color: var(--accent);">&rarr;</span>
            </a>
            <a href="/viewhistory" class="card-dark text-decoration-none d-flex align-items-center justify-content-between" style="padding: 1.5rem 2rem;">
                <span class="fs-5" style="color: var(--text-primary);">View My History</span>
                <span style="color: var(--accent);">&rarr;</span>
            </a>
            <a href="/deletehistory" class="card-dark text-decoration-none d-flex align-items-center justify-content-between" style="padding: 1.5rem 2rem;">
                <span class="fs-5" style="color: var(--text-primary);">Delete My History</span>
                <span style="color: var(--accent);">&rarr;</span>
            </a>
        </div>
        <p class="text-center mt-4"><a href="/" style="color: var(--text-secondary);">Back to Home</a></p>
    </div>
</div>
{% endblock %}
