{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="page-center">
    <div class="card-dark" style="width: 100%; max-width: 420px;">
        <h2 class="section-title text-center mb-4">Admin Login</h2>
        <form method="POST" action="/admincheck_cred">
            <div class="mb-3">
                <input type="text" name="UserName" class="form-control form-control-dark" placeholder="Admin username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="Password" class="form-control form-control-dark" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-accent w-100">Login</button>
        </form>
    </div>
</div>
{% endblock %}
